# Gate override — layered on top of the official Omnigent stack:
#   docker compose --env-file deploy/.env \
#     -f ~/omnigent/deploy/docker/docker-compose.yaml \
#     -f ~/omnigent/deploy/docker/docker-compose.https.yaml \
#     -f deploy/docker-compose.gate.yaml up -d
#
# What it changes vs. the upstream files:
#   - omnigent: AUTH_ENABLED=0 (single "local" user); republish a
#     loopback-only port for the local runner (the https overlay reset it).
#   - oauth2-proxy: NEW full reverse proxy in front of omnigent, GitHub
#     OAuth restricted to one account (OAUTH2_PROXY_GITHUB_USER).
#   - caddy: point at oauth2-proxy instead of omnigent.
services:
  omnigent:
    environment:
      OMNIGENT_AUTH_ENABLED: "0"
    ports: !override
      - "127.0.0.1:8000:8000"   # loopback runner path only; not public

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    depends_on: [omnigent]
    command:
      - --provider=github
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --upstream=http://omnigent:8000
      - --email-domain=*                       # restriction is by github user, not email
      - --redirect-url=https://${OMNIGENT_DOMAIN}/oauth2/callback
      - --cookie-secure=true
      - --cookie-domain=${OMNIGENT_DOMAIN}
      - --whitelist-domain=${OMNIGENT_DOMAIN}
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_GITHUB_USER: ${OAUTH2_PROXY_GITHUB_USER}   # allowlist; comma-separated for multiple, e.g. alice,bob

  caddy:
    depends_on: [oauth2-proxy]
    volumes:
      - /home/ethan/meta-harness/deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
