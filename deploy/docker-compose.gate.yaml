# Gate override — Option C (Cloudflare Tunnel edge). Layered on the official
# BASE compose only (NOT the https overlay — there is no Caddy in this design):
#
#   docker compose --env-file deploy/.env \
#     -f ~/omnigent/deploy/docker/docker-compose.yaml \
#     -f deploy/docker-compose.gate.yaml up -d
#
# Edge path:  Cloudflare edge (TLS) → cloudflared (outbound tunnel) →
#             oauth2-proxy (GitHub gate) → omnigent:8000
#
# Properties:
#   - NO inbound ports published to the internet. The only host-published
#     port is omnigent on 127.0.0.1:8000 (loopback runner path).
#   - cloudflared dials out to Cloudflare; nothing listens for inbound.
#   - oauth2-proxy: GitHub OAuth, single-account allowlist (echung32).
#   - omnigent: AUTH_ENABLED=0 (single "local" user) behind the gate.
services:
  omnigent:
    environment:
      OMNIGENT_AUTH_ENABLED: "0"
      # Trust the public origin for CSRF/Origin checks on multipart POSTs
      # (chat uploads) and the realtime WebSocket. Without this the server
      # only trusts loopback origins and rejects the browser with
      # "requires a trusted Origin header".
      OMNIGENT_WS_ALLOWED_ORIGINS: "https://${OMNIGENT_DOMAIN}"
      # Sub-project B: register our forked cross-vendor orchestrator as an
      # always-available built-in (named after the dir → "review-loop"), so it
      # shows in the web UI agent picker. os.pathsep-separated; idempotent &
      # content-aware, so a redeploy refreshes a changed spec. The bundle is
      # bind-mounted read-only below; the host runner fetches it from the
      # server when a session starts.
      OMNIGENT_BUILTIN_AGENT_DIRS: /agents/review-loop
    volumes:
      # Absolute host path (via .env) — with multiple -f files compose resolves
      # a relative path against the FIRST file's dir (~/omnigent/...), not this
      # repo. META_HARNESS_DIR is the checkout root, set in deploy/.env.
      - ${META_HARNESS_DIR}/agents/review-loop:/agents/review-loop:ro
    ports: !override
      - "127.0.0.1:8000:8000"   # loopback runner path only; never public

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    depends_on: [omnigent]
    command:
      - --provider=github
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true                    # trust X-Forwarded-* from cloudflared
      - --upstream=http://omnigent:8000
      # Do NOT forward identity to omnigent: it runs AUTH_ENABLED=0 (single
      # "local" user). If oauth2-proxy injects X-Forwarded-User/Email,
      # omnigent resolves the browser as the GitHub user (not "local") and
      # the loopback-registered host disappears from the UI. Strip them so
      # every gated request is the same single "local" user as the runner.
      - --pass-basic-auth=false
      - --pass-user-headers=false
      - --email-domain=*                        # restriction is by github user
      - --redirect-url=https://${OMNIGENT_DOMAIN}/oauth2/callback
      - --cookie-secure=true
      - --cookie-domain=${OMNIGENT_DOMAIN}
      - --whitelist-domain=${OMNIGENT_DOMAIN}
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_GITHUB_USER: ${OAUTH2_PROXY_GITHUB_USER}   # comma-separated for multiple

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on: [oauth2-proxy]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}          # connector token; routes to http://oauth2-proxy:4180
